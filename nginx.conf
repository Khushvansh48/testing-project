##############################################################
# KangPOS — Nginx Configuration (HTTP, no domain yet)
# Place at: /etc/nginx/sites-available/kangpos
# Enable:   sudo ln -s /etc/nginx/sites-available/kangpos /etc/nginx/sites-enabled/kangpos
#           sudo rm -f /etc/nginx/sites-enabled/default
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
#
# When you get a domain, replace 35.154.251.72 with it everywhere,
# then run: sudo certbot --nginx -d yourdomain.com
##############################################################

server {
    listen 80;
    server_name 35.154.251.72;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ── Frontend (React SPA static files) ─────────────────────────────────────
    root /var/www/html;
    index index.html;

    # ── Backend API proxy → Node.js on port 3000 ─────────────────────────────
    # All these prefixes are backend routes (no /api/ prefix in this project)
    location ~* ^/(auth|menu|orders|expenses|vendors|business-days|withdrawals|reports|staff|cash|bank|settings|restaurant|roster|payroll|billing|xero|ai|combos|eftpos|health|uploads|whatsapp|webhook)(/|$) {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }

    # React Router — serve index.html for all other routes (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
